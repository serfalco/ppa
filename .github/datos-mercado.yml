name: PPA - Datos de mercado

# Workflow LIVIANO: solo actualiza data/datos.json con los datos intradía
# (dólar, merval, riesgo país). No regenera el diario. Corre cada hora
# en horario de mercado para mantener el ticker y las tarjetas frescos.

on:
  schedule:
    # Cada hora, días hábiles (lun-vie), 10–18 ARG = 13–21 UTC
    - cron: '0 13-21 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

# Evita que dos corridas se pisen
concurrency:
  group: ppa-datos
  cancel-in-progress: false

jobs:
  datos-mercado:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Actualizar datos de mercado
        run: python scripts/datos_economicos.py --solo-mercado

      - name: Copiar JSON al site
        run: |
          mkdir -p site/data
          cp data/datos.json site/data/ || true

      - name: Commit si hay cambios
        run: |
          git config user.name "PPA Bot"
          git config user.email "bot@pulsoproductivo.com.ar"
          git add data/datos.json site/data/datos.json
          if ! git diff --staged --quiet; then
            git commit -m "Datos de mercado — $(date -u '+%Y-%m-%d %H:%M UTC')"
            git pull --rebase origin main
            git push
          fi

      - name: Deploy datos a Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./site/
          server-dir: ./
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/__pycache__/**
