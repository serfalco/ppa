name: PPA - Ediciones Diarias

on:
  schedule:
    - cron: '0 9 * * *'    # Desayuno 🧉 — 06:00 ARG (UTC-3)
    - cron: '15 20 * * *'  # Merienda ☕ — 17:15 ARG (UTC-3)
  workflow_dispatch:
    inputs:
      edicion:
        description: 'Edición a generar'
        required: false
        default: 'auto'
        type: choice
        options: [auto, desayuno, merienda]

permissions:
  contents: write

jobs:
  generar-edicion:
    runs-on: ubuntu-24.04
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install feedparser requests pandas openpyxl xlrd

      - name: Detectar edición
        id: edicion
        run: |
          HORA=$(date -u +%H)
          INPUT="${{ github.event.inputs.edicion }}"
          if [ "$INPUT" = "desayuno" ]; then NOMBRE="Desayuno"; ICONO="🧉"
          elif [ "$INPUT" = "merienda" ]; then NOMBRE="Merienda"; ICONO="☕"
          elif [ "$HORA" -lt 14 ]; then NOMBRE="Desayuno"; ICONO="🧉"
          else NOMBRE="Merienda"; ICONO="☕"
          fi
          echo "nombre=$NOMBRE" >> $GITHUB_OUTPUT
          echo "icono=$ICONO" >> $GITHUB_OUTPUT
          echo "[PPA] Generando edición: $NOMBRE $ICONO"

      - name: Fetcher - bajar RSS (siempre fresco en edición)
        run: python scripts/fetcher.py --forzar

      - name: Selector - elegir notas
        run: python scripts/selector.py

      - name: Datos económicos
        run: python scripts/datos_economicos.py

      - name: Resumidor - resúmenes con Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/resumidor.py
        continue-on-error: true

      - name: Generador - La Data del Día
        run: python scripts/generador_la_data.py

      - name: Generador - REM
        run: python scripts/generador_rem.py
        continue-on-error: true

      - name: Generador - Informes
        run: python scripts/generador_informes.py
        continue-on-error: true

      - name: Generador - Documentos
        run: python scripts/generador_documentos.py

      - name: Generador - Columnas
        run: python scripts/generador_columnas.py

      - name: Generador - TXT-Stream
        run: python scripts/generador_stream.py

      - name: Generador - EconoTuits
        run: python scripts/generador_tuits.py
        continue-on-error: true

      - name: Generador - Tablero PPA
        run: python scripts/generador_tablero.py
        continue-on-error: true

      - name: Generador - TCRM histórico
        run: python scripts/generador_tcrm.py
        continue-on-error: true

      - name: Generador - Acerca de
        run: python scripts/generador_acerca.py
        continue-on-error: true

      - name: Generador - Home portal
        env:
          PPA_EDICION_NOMBRE: ${{ steps.edicion.outputs.nombre }}
          PPA_EDICION_ICONO: ${{ steps.edicion.outputs.icono }}
        run: python scripts/generador_home.py

      - name: Exportar config de fuentes
        run: python scripts/exportar_config.py
        continue-on-error: true

      - name: Copiar JSONs al site
        run: |
          mkdir -p site/data
          cp data/*.json site/data/ || true

      - name: Commit cambios
        run: |
          git config user.name "PPA Bot"
          git config user.email "bot@pulsoproductivo.com.ar"
          git add data/ site/
          if ! git diff --staged --quiet; then
            EDICION="${{ steps.edicion.outputs.nombre }}"
            ICONO="${{ steps.edicion.outputs.icono }}"
            git commit -m "Edición ${EDICION} ${ICONO} — $(date -u '+%Y-%m-%d %H:%M UTC')"
            git pull --rebase -X theirs origin main
            git push
          fi

      - name: Deploy a Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./site/
          server-dir: ./
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/__pycache__/**
