name: PPA - Edición Merienda

# ============================================================
# Cuándo corre:
# - Todos los días a las 21:00 UTC = 18:00 hora Argentina
# - También se puede disparar manualmente desde la pestaña Actions
# ============================================================
on:
  schedule:
    - cron: '0 21 * * *'  # 18hs Argentina (UTC-3)
  workflow_dispatch:      # disparo manual desde GitHub UI

permissions:
  contents: write

jobs:
  generar-edicion:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # 1. Bajar el código del repo
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Configurar Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 3. Instalar dependencias
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser requests

      # 4. Leer todos los RSS y armar notas.json
      - name: Fetcher - leer fuentes RSS
        run: python scripts/fetcher.py

      # 5. Algoritmo de destacados y portada.json
      - name: Selector - elegir destacados
        run: python scripts/selector.py

      # 6. Generar HTML de "Lo que se dice"
      - name: Generador - Lo que se dice
        run: python scripts/generador.py

      # 7. Generar HTML de Expectativas de mercado
      - name: Generador - Expectativas de mercado
        run: python scripts/generador_expectativas.py

      # 8. Generar HTML de Documentos en circulación
      - name: Generador - Documentos en circulación
        run: python scripts/generador_documentos.py

      # 9. Generar HTML de Columnas
      - name: Generador - Columnas
        run: python scripts/generador_columnas.py

      # 10. Generar HTML del Stream
      - name: Generador - Stream
        run: python scripts/generador_stream.py

      # 11. Generar página Acerca de
      - name: Generador - Acerca de
        run: python scripts/generador_acerca.py

      # 12. Generar la HOME PORTAL (lee todo lo anterior)
      - name: Generador - Home portal
        run: python scripts/generador_home.py

      # 13. Exportar config de fuentes para el panel
      - name: Exportar config de fuentes
        run: python scripts/exportar_config.py

      # 14. Copiar JSONs a site/data/ para que el panel los lea
      - name: Copiar JSONs al site
        run: |
          mkdir -p site/data
          cp data/*.json site/data/ || true

      # 15. Commit de los archivos generados al repo
      - name: Commit cambios
        run: |
          git config user.name "PPA Bot"
          git config user.email "bot@pulsoproductivo.com.ar"
          git add data/ site/
          if ! git diff --staged --quiet; then
            git commit -m "Edición Merienda automática $(date -u +%Y-%m-%d)"
            git pull --rebase origin main
            git push
          fi

      # 16. Deploy a Hostinger vía FTP
      - name: Deploy a Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./site/
          server-dir: ./
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/__pycache__/**
