name: PPA - Ediciones Diarias

on:
  schedule:
    - cron: '0 9 * * *'    # Desayuno 🧉 — 06:00 ARG (UTC-3)
    - cron: '15 20 * * *'  # Merienda ☕ — 17:15 ARG (UTC-3)
  workflow_dispatch:
    inputs:
      edicion:
        description: 'Edición a generar'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - desayuno
          - merienda

permissions:
  contents: write

jobs:
  generar-edicion:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser requests

      - name: Detectar edición
        id: edicion
        run: |
          # Determinar qué edición es según la hora UTC
          HORA=$(date -u +%H)
          MIN=$(date -u +%M)
          INPUT="${{ github.event.inputs.edicion }}"

          if [ "$INPUT" = "desayuno" ]; then
            NOMBRE="Desayuno"
            ICONO="🧉"
          elif [ "$INPUT" = "merienda" ]; then
            NOMBRE="Merienda"
            ICONO="☕"
          elif [ "$HORA" -lt 14 ]; then
            NOMBRE="Desayuno"
            ICONO="🧉"
          else
            NOMBRE="Merienda"
            ICONO="☕"
          fi

          echo "nombre=$NOMBRE" >> $GITHUB_OUTPUT
          echo "icono=$ICONO" >> $GITHUB_OUTPUT
          echo "[PPA] Generando edición: $NOMBRE $ICONO"

      - name: Fetcher - leer fuentes RSS
        run: python scripts/fetcher.py

      - name: Selector - elegir destacados
        run: python scripts/selector.py

      - name: Generador - Lo que se dice
        run: python scripts/generador.py

      - name: Generador - Expectativas de mercado
        run: python scripts/generador_expectativas.py

      - name: Generador - Documentos en circulación
        run: python scripts/generador_documentos.py

      - name: Generador - Columnas
        run: python scripts/generador_columnas.py

      - name: Generador - Stream
        run: python scripts/generador_stream.py

      - name: Generador - Acerca de
        run: python scripts/generador_acerca.py

      - name: Datos económicos (completo, incluye mensuales)
        run: python scripts/datos_economicos.py

      - name: Generador - Tablero PPA
        run: python scripts/generador_tablero.py
        continue-on-error: true  # si todavía no existe, no rompe el deploy

      - name: Generador - Home portal
        env:
          PPA_EDICION_NOMBRE: ${{ steps.edicion.outputs.nombre }}
          PPA_EDICION_ICONO: ${{ steps.edicion.outputs.icono }}
        run: python scripts/generador_home.py

      - name: Exportar config de fuentes
        run: python scripts/exportar_config.py

      - name: Copiar JSONs al site
        run: |
          mkdir -p site/data
          cp data/*.json site/data/ || true

      - name: Commit cambios
        run: |
          git config user.name "PPA Bot"
          git config user.email "bot@pulsoproductivo.com.ar"
          git add data/ site/
          if ! git diff --staged --quiet; then
            EDICION="${{ steps.edicion.outputs.nombre }}"
            ICONO="${{ steps.edicion.outputs.icono }}"
            git commit -m "Edición ${EDICION} ${ICONO} — $(date -u '+%Y-%m-%d %H:%M UTC')"
            git pull --rebase origin main
            git push
          fi

      - name: Deploy a Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./site/
          server-dir: ./
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/__pycache__/**
