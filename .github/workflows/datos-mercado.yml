name: PPA - Datos de mercado
# El deploy ya NO usa FTP/Hostinger: al pushear a main, Cloudflare Pages
# (conectado al repo, directorio de salida: site/) publica automáticamente.
on:
  schedule:
    - cron: '0 13-21 * * 1-5'
  workflow_dispatch:
permissions:
  contents: write
  issues: write
concurrency:
  group: ppa-datos
  cancel-in-progress: false
jobs:
  datos-mercado:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
      - name: Actualizar datos de mercado
        run: python scripts/datos_economicos.py --solo-mercado
      - name: Actualizar histórico acumulativo
        run: python scripts/historico.py
      - name: Copiar JSON al site
        run: |
          mkdir -p site/data
          cp data/datos.json site/data/ || true
      - name: Commit si hay cambios
        run: |
          git config user.name "PPA Bot"
          git config user.email "bot@pulsoproductivo.com.ar"
          git add data/ site/data/
          if ! git diff --staged --quiet; then
            git commit -m "Datos de mercado — $(date -u '+%Y-%m-%d %H:%M UTC')"
            git pull --rebase -X theirs origin main
            git push
          fi
      - name: Alerta si falló
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --title "⚠ Falló Datos de mercado — $(date -u '+%Y-%m-%d %H:%M UTC')" \
            --body "El workflow **Datos de mercado** falló. Ver corrida: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --label "alerta" || true
